provider:
  model: gpt-4o-mini
  base_url: https://api.siliconflow.cn/v1
  api_keys: []
  api_keys_env: CONFIDENCE_API_KEYS
  temperature: 0.7

result_name: gpt-4o-mini

runtime:
  batch_size: 5
  max_rounds: 16
  max_retries: 30
  timeout: 60
  unknown_retry_limit: 3

paths:
  prompts: data/prompt.json
  prompt_extended: data/prompt_extended.json
  evaluation_dir: outputs/evaluation
  output_dir: outputs/persistence
